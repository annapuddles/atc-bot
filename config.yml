# Paths to use for the log files
logs:
  # The main log for all messages
  main: atc.log

  # Log for only radio messages
  transcript: transcript.log

# Corrade configuration
corrade:
  # The Corrade MQTT server URL
  mqtt: https://127.0.0.1:1883

  # The Corrade group for commands
  group: MyGroup

  # The corrade password for commands
  password: MyGroupPassword

  # The language used for scripts, WAS or JSON
  language: WAS

# GridTalkie config
gridtalkie:
  # Mapping of GridTalkie channels to the SL text channels that the viewer
  # will use to interact with them.
  channels:
    12270-Gridwide ATC: 11
    11920-BLAKE: 12

# ATC bot configuration
atc:
  # The handle to use on GridTalkie
  handle: ICAO TOWER

  # The prefix that messages must start with for the bot to reply
  prefix: ICAO

  # Extra information given with generic departure clearances
  departureInfo: ""

  # Extra information given with runway departure clearances
  departureInfoRunway: ""

  # Extra information given with helipad departure clearances
  departureInfoHelipad: ""

  # Extra information given for approach messages
  approachInfo: ""

  # Extra information given with generic landing clearances
  landingInfo: ""

  # Extra information given with runway landing clearances
  landingInfoRunway: ""

  # Extra information given with helipad landing clearances
  landingInfoHelipad: ""

# Shergood METAR config
metar:
  # The ICAO of the airport
  icao: ICAO
  
  # How often in milliseconds to update the METAR data
  update: 300000
